[alembic]
script_location = alembic
prepend_sys_path = src
# URL is read from the environment in env.py; this is a dev fallback only.
sqlalchemy.url = postgresql+asyncpg://portfolio:portfolio@localhost:5432/portfolio

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
